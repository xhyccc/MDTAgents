ui:
  language: zh   # zh = Chinese prompts/UI | en = English prompts/UI

opencode:
  max_workers: 2
  max_rounds: 5
  timeout: 600
  specialist_timeout: 1800  # 30 minutes per specialist agent
paths:
  cases_dir: cases
  prompts_dir: prompts
  workspace_name: .mdt_workspace
specialists:
- file_categories:
  - 影像
  name: 影像科
- file_categories:
  - 病理
  name: 病理科
- file_categories:
  - 检验
  - 病历
  - 既往治疗
  name: 肿瘤内科
- file_categories:
  - 影像
  - 病理
  - 检验
  name: 外科
- file_categories:
  - 检验
  - 病历
  name: 内科
workflow:
  enable_debate: true
  rounds:
  - index
  - dispatch
  - parallel_consult
  - synthesis
